<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Enemyskin: Last Shape Standing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-row">
      <div class="bar-group">
        <div class="bar-label">HP</div>
        <div class="bar hp"><div class="fill" id="hp-fill"></div><div class="bar-text" id="hp-text">80 / 80</div></div>
      </div>
      <div class="bar-group">
        <div class="bar-label">EN</div>
        <div class="bar en"><div class="fill" id="en-fill"></div><div class="bar-text" id="en-text">100 / 100</div></div>
      </div>
    </div>
    <div class="hud-row">
      <div id="form-info">
        <span class="form-name" id="form-name">Human Shell</span>
        <span class="form-stats" id="form-stats"></span>
      </div>
      <div id="wave-info">
        Wave <span id="wave-num">1</span> &middot; Threat <span id="threat-num">1</span>
      </div>
    </div>
    <div id="forms-rack"></div>
    <div id="combat-log"></div>
  </div>

  <div id="mobile-ui" class="hidden">
    <div id="joystick">
      <div id="joy-base"></div>
      <div id="joy-stick"></div>
    </div>
    <div id="mobile-actions">
      <button class="m-btn" data-act="attack">ATK</button>
      <button class="m-btn" data-act="block">BLK</button>
      <button class="m-btn" data-act="parry">PRY</button>
      <button class="m-btn" data-act="evade">EVD</button>
      <button class="m-btn" data-act="sprint">RUN</button>
      <button class="m-btn m-morph" data-act="morph">MORPH</button>
    </div>
  </div>

  <div id="death-overlay" class="hidden">
    <div class="death-box">
      <h1>The shape fell.</h1>
      <p>Run ended on wave <span id="death-wave">1</span> with <span id="death-forms">0</span> captured forms.</p>
      <button id="restart-btn">Begin a new run</button>
    </div>
  </div>

  <div id="help-panel">
    <strong>Enemyskin: Last Shape Standing</strong>
    <div class="kbd-row"><b>Move</b> WASD / Arrows</div>
    <div class="kbd-row"><b>Attack</b> LMB / Space</div>
    <div class="kbd-row"><b>Block</b> Shift (hold)</div>
    <div class="kbd-row"><b>Parry</b> E / RMB (tap)</div>
    <div class="kbd-row"><b>Evade</b> F</div>
    <div class="kbd-row"><b>Sprint</b> C / Ctrl</div>
    <div class="kbd-row"><b>Morph</b> Q / Tab (cycles captured forms)</div>
    <button id="help-close">got it</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
